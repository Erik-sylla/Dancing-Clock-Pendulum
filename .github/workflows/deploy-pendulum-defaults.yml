name: Deploy Pendulum Defaults Cloud Function

on:
  #push:
  #  branches:
  #    - main
  #  paths:
  #    - 'gcf-pendulum-defaults/**'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to Google Cloud Functions
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation (keyless auth)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Recommended: keyless auth via Workload Identity Federation.
          # Set this secret in GitHub → Settings → Secrets and variables → Actions.
          # See: https://github.com/google-github-actions/auth#workload-identity-federation
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # ── Alternative: Service Account key (simpler but less secure) ──────
          # Comment out the two lines above and uncomment the line below,
          # then add the exported JSON key as the GCP_SA_KEY secret.
          # credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy Cloud Function
        uses: google-github-actions/deploy-cloud-functions@v3
        with:
          name: pendulumDefaults
          runtime: nodejs20
          region: ${{ vars.GCP_REGION }}          # e.g. us-central1  (set in repo Variables)
          source_dir: gcf-pendulum-defaults
          entry_point: pendulumDefaults
          ingress_settings: ALLOW_ALL
          # Remove the line below if you want the function to require authentication
          all_traffic_on_latest_revision: true

      - name: Print function URL
        run: |
          echo "Function deployed successfully."
          echo "URL: https://${{ vars.GCP_REGION }}-${{ vars.GCP_PROJECT_ID }}.cloudfunctions.net/pendulumDefaults"
          echo "Update CONFIG_URL in clock-pendulum-pattern.html with the URL above."
